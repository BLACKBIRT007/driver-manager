name: Build & Release

on:
  push:
    tags:
      - 'v*'           # triggers on tags like v1.0.0, v1.2.3

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write version to file
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          Set-Content -Path version.txt -Value $tag
        shell: pwsh

      - name: Build EXEs with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name "DriverManager" `
            --add-data "version.txt;." `
            --hidden-import "wmi" `
            --hidden-import "win32api" `
            --hidden-import "win32con" `
            --hidden-import "pystray" `
            --hidden-import "PIL" `
            main_window.py

          pyinstaller --noconfirm --onefile --windowed `
            --name "Launcher" `
            launcher.py

          New-Item -ItemType Directory -Force -Path release
          Copy-Item dist\DriverManager.exe release\
          Copy-Item dist\Launcher.exe release\
          Copy-Item version.txt release\
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: pwsh

      - name: Build Windows installer
        run: |
          $version = Get-Content version.txt
          (Get-Content setup_builder\installer.iss) `
            -replace '#define AppVersion "1.0.0"', "#define AppVersion `"$version`"" | `
            Set-Content setup_builder\installer_versioned.iss
          iscc setup_builder\installer_versioned.iss
        shell: pwsh

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/DriverManager_Setup_*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
