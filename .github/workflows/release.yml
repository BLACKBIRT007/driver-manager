name: Build and Release Driver Handler by CROD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version number without v, example: 1.0.1"
        required: true
        default: "1.0.1"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }

          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          Set-Content -Path "version.txt" -Value $version -Encoding ASCII

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }
          pip install pyinstaller

      - name: Build main app
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --onefile --noconsole 
            --name "DriverHandlerByCROD" 
            --add-data "version.txt;." 
            --hidden-import "wmi" 
            --hidden-import "win32api" 
            --hidden-import "win32con" 
            --hidden-import "pystray" 
            --hidden-import "PIL" 
            main_window.py

      - name: Build launcher
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --onefile --noconsole 
            --name "Launcher" 
            --hidden-import "auto_updater" 
            --hidden-import "config" 
            --hidden-import "logger" 
            launcher.py

      - name: Prepare release folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item dist\DriverHandlerByCROD.exe release\
          Copy-Item dist\Launcher.exe release\
          Copy-Item version.txt release\

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "setup_builder\installer.iss"

      - name: Rename installer to stable latest-download filename
        shell: pwsh
        run: |
          $installer = Get-ChildItem "setup_builder\installer_output" -Filter "*.exe" | Select-Object -First 1
          Copy-Item $installer.FullName "Driver_Handler_By_CROD_Setup.exe" -Force

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Driver Handler by CROD v${{ env.VERSION }}
          body: |
            Driver Handler by CROD v${{ env.VERSION }}

            Download:
            Driver_Handler_By_CROD_Setup.exe
          files: Driver_Handler_By_CROD_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
